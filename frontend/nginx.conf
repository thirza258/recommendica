server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location /api/ {
    proxy_pass http://backend:8000;
    proxy_http_version 1.1;

    # ── Timeout tuning ───────────────────────────────────────────────
    # The RAG pipeline runs multiple sequential LLM calls (HyDE →
    # step-back → rag-fusion → per-chunk generation) and can easily
    # exceed nginx's default 60 s proxy_read_timeout.
    proxy_connect_timeout 30s;
    proxy_send_timeout    600s;
    proxy_read_timeout    600s;

    # Disable buffering so the client sees partial responses / error
    # payloads as soon as the backend sends them.
    proxy_buffering off;
    proxy_request_buffering off;

    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
